name: 自动添加关注股票

on:
  issues:
    types: [opened]

jobs:
  add-stock:
    if: startsWith(github.event.issue.title, 'add:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 解析并添加股票
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Format: "add:CODE NAME"
          CODE=$(echo "$TITLE" | grep -oP '(?<=add:)\s*\K\d{6}')
          NAME=$(echo "$TITLE" | sed 's/add:\s*\d*\s*//')
          echo "CODE=$CODE" >> $GITHUB_OUTPUT
          echo "NAME=$NAME" >> $GITHUB_OUTPUT

          if [ -z "$CODE" ]; then
            echo "ERROR: 无法从标题解析股票代码"
            exit 1
          fi

          # Check if already in list
          if grep -q "^$CODE$" stock_list.txt 2>/dev/null; then
            echo "DUPLICATE=true" >> $GITHUB_OUTPUT
            echo "⚠️ 股票 $CODE 已在关注列表中"
          else
            echo "$CODE" >> stock_list.txt
            echo "DUPLICATE=false" >> $GITHUB_OUTPUT
            echo "✅ 已添加 $CODE $NAME"
          fi

      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_list.txt
          git commit -m "Add stock ${{ steps.parse.outputs.CODE }} ${{ steps.parse.outputs.NAME }}" || echo "no changes"
          git push

      - name: 回复 Issue
        uses: actions/github-script@v7
        with:
          script: |
            const code = '${{ steps.parse.outputs.CODE }}';
            const name = '${{ steps.parse.outputs.NAME }}';
            const isDup = '${{ steps.parse.outputs.DUPLICATE }}' === 'true';

            const body = isDup
              ? `⚠️ **${name || code}** (${code}) 已在关注列表中，无需重复添加。`
              : `✅ **${name || code}** (${code}) 已添加到关注列表！\n\n明天 18:00 的日报将包含此股票。\n\n📱 [查看最新报告](https://ljc060422.github.io/daily_stock_analysis/)`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed',
              labels: ['stock-added']
            });
